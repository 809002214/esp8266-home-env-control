<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980">
  <defs>
    <style>
      .bg { fill: #f2efe8; }
      .title { font: 700 30px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #1d2c34; }
      .sub { font: 500 15px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #536770; }
      .card { fill: #fff; stroke: #d8d2c5; stroke-width: 2; rx: 10; }
      .cardTitle { font: 700 17px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #263740; }
      .note { font: 500 12px "Consolas", "Segoe UI", sans-serif; fill: #5e727c; }

      /* 真实 OLED 区域：128x64 */
      .oled { fill: #0b0f12; stroke: #2f3a40; stroke-width: 2; }
      .px1 { font: 500 4px "Consolas", "Microsoft YaHei", monospace; fill: #d6e2ee; }
      .px2 { font: 700 4px "Consolas", "Microsoft YaHei", monospace; fill: #f5fbff; }
      .px3 { font: 700 7px "Consolas", "Microsoft YaHei", monospace; fill: #f7fcff; }
      .icon { stroke: #f7fcff; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="980" class="bg"/>
  <text x="40" y="56" class="title">OLED 原型（严格 128x64 布局，8 页）</text>
  <text x="40" y="84" class="sub">每块黑色屏幕均为真实 128x64 比例，中文优先，页码固定，开机时间已改可读格式</text>

  <!-- === Row 1 === -->
  <!-- P1 环境总览 -->
  <rect x="40" y="120" width="390" height="390" class="card"/>
  <text x="62" y="152" class="cardTitle">P1 环境总览</text>
  <text x="62" y="174" class="note">图标和右侧文字已加大间距</text>
  <g transform="translate(62,194) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">环境总览                 1/8</text>
    <!-- 温度图标 -->
    <line x1="8" y1="14" x2="8" y2="23" class="icon"/>
    <circle cx="8" cy="26" r="3" class="icon"/>
    <text x="20" y="20" class="px2">温度 : 26.4 C</text>
    <!-- 湿度图标 -->
    <path d="M6 37 C6 34,9 32,9 28 C9 32,12 34,12 37 C12 40,10 42,9 42 C8 42,6 40,6 37Z" class="icon"/>
    <text x="20" y="37" class="px2">湿度 : 58 %</text>
    <text x="3" y="50" class="px1">开关 : ON</text>
    <text x="3" y="58" class="px1">芯片 : 00EE2A</text>
  </g>

  <!-- P2 网络状态 -->
  <rect x="450" y="120" width="390" height="390" class="card"/>
  <text x="472" y="152" class="cardTitle">P2 网络状态</text>
  <text x="472" y="174" class="note">保留 Wi-Fi/MQTT/RSSI/IP/开机时长</text>
  <g transform="translate(472,194) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">网络状态                 2/8</text>
    <text x="3" y="18" class="px1">WiFi : 已连接</text>
    <text x="3" y="26" class="px1">MQTT : 已连接</text>
    <text x="3" y="34" class="px1">信号 : -58 dBm</text>
    <text x="3" y="42" class="px1">IP   : 192.168.1.172</text>
    <text x="3" y="50" class="px1">开机 : 1天 03时 25分 10秒</text>
    <text x="3" y="58" class="px1">固件 : 1.3.0</text>
  </g>

  <!-- P3 时钟日期 -->
  <rect x="860" y="120" width="390" height="390" class="card"/>
  <text x="882" y="152" class="cardTitle">P3 时钟日期</text>
  <text x="882" y="174" class="note">中文标签 + 大时间</text>
  <g transform="translate(882,194) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">时钟日期                 3/8</text>
    <text x="6" y="30" class="px3">19:42:08</text>
    <text x="3" y="42" class="px1">日期 : 2026-04-15</text>
    <text x="3" y="50" class="px1">NTP  : 已同步</text>
    <text x="3" y="58" class="px1">时区 : +8.0</text>
  </g>

  <!-- P4 设备信息 -->
  <rect x="1270" y="120" width="390" height="390" class="card"/>
  <text x="1292" y="152" class="cardTitle">P4 设备信息</text>
  <text x="1292" y="174" class="note">原有字段：设备名/型号/固件/序列号</text>
  <g transform="translate(1292,194) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">设备信息                 4/8</text>
    <text x="3" y="18" class="px1">设备 : Env-00EE2A</text>
    <text x="3" y="26" class="px1">型号 : ESP8266_ENV</text>
    <text x="3" y="34" class="px1">固件 : v1.3.0</text>
    <text x="3" y="42" class="px1">序列 : NMCU-00EE2A</text>
    <text x="3" y="50" class="px1">硬件 : NODEMCU_V3</text>
  </g>

  <!-- === Row 2 === -->
  <!-- P5 校准参数 -->
  <rect x="40" y="540" width="390" height="390" class="card"/>
  <text x="62" y="572" class="cardTitle">P5 校准参数</text>
  <text x="62" y="594" class="note">时区/温度偏移/湿度偏移</text>
  <g transform="translate(62,614) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">校准参数                 5/8</text>
    <text x="3" y="18" class="px1">时区   : +8.0</text>
    <text x="3" y="26" class="px1">温偏移 : +0.5 C</text>
    <text x="3" y="34" class="px1">湿偏移 : +3.0 %</text>
    <text x="3" y="42" class="px1">配置   : 有效</text>
    <text x="3" y="50" class="px1">轮播间隔: 5 秒</text>
  </g>

  <!-- P6 天气信息 -->
  <rect x="450" y="540" width="390" height="390" class="card"/>
  <text x="472" y="572" class="cardTitle">P6 天气信息</text>
  <text x="472" y="594" class="note">新增天气页，中文天气词</text>
  <g transform="translate(472,614) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">天气信息                 6/8</text>
    <path d="M14 27 C14 23,18 20,22 20 C26 20,30 22,31 25 C33 24,35 24,37 24 C42 24,46 28,46 33 C46 38,42 42,37 42 L22 42 C17 42,13 38,13 33 C13 30,13 28,14 27Z" class="icon"/>
    <text x="52" y="26" class="px2">天气 : 多云</text>
    <text x="52" y="34" class="px1">当前 : 27 C</text>
    <text x="52" y="42" class="px1">最高 : 30 C</text>
    <text x="52" y="50" class="px1">最低 : 22 C</text>
    <text x="3" y="58" class="px1">来源 : MQTT天气主题</text>
  </g>

  <!-- P7 OTA -->
  <rect x="860" y="540" width="390" height="390" class="card"/>
  <text x="882" y="572" class="cardTitle">P7 OTA 状态</text>
  <text x="882" y="594" class="note">原有 OTA 字段全部保留</text>
  <g transform="translate(882,614) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">OTA状态                  7/8</text>
    <text x="3" y="18" class="px1">状态 : READY</text>
    <text x="3" y="26" class="px1">端口 : 1880</text>
    <text x="3" y="34" class="px1">路径 : /firmware/...bin</text>
    <text x="3" y="42" class="px1">进度 : --</text>
    <text x="3" y="50" class="px1">触发 : MQTT / 页面按钮</text>
  </g>

  <!-- P8 故障恢复 -->
  <rect x="1270" y="540" width="390" height="390" class="card"/>
  <text x="1292" y="572" class="cardTitle">P8 故障恢复</text>
  <text x="1292" y="594" class="note">错误摘要 + 传感器健康 + 配置状态</text>
  <g transform="translate(1292,614) scale(2.5)">
    <rect x="0" y="0" width="128" height="64" class="oled"/>
    <text x="3" y="7" class="px2">故障恢复                 8/8</text>
    <text x="3" y="18" class="px1">错误 : OK</text>
    <text x="3" y="26" class="px1">DS18 : 正常</text>
    <text x="3" y="34" class="px1">DHT11: 正常</text>
    <text x="3" y="42" class="px1">配置 : 有效</text>
    <text x="3" y="50" class="px1">恢复 : 自动重试中</text>
  </g>
</svg>

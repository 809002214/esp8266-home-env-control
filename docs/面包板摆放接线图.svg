<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1180" viewBox="0 0 1700 1180">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .tiny { font: 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .pin { font: 14px 'Consolas', 'Courier New', monospace; fill: #111827; }
      .breadboard { fill: #fffef9; stroke: #94a3b8; stroke-width: 2; rx: 16; ry: 16; }
      .board { fill: #e0f2fe; stroke: #0f172a; stroke-width: 2; rx: 14; ry: 14; }
      .module { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 12; ry: 12; }
      .note { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; ry: 12; }
      .powerrail { stroke: #dc2626; stroke-width: 5; fill: none; }
      .groundrail { stroke: #111827; stroke-width: 5; fill: none; }
      .power { stroke: #dc2626; stroke-width: 4; fill: none; }
      .gnd { stroke: #111827; stroke-width: 4; fill: none; }
      .spi_clk { stroke: #2563eb; stroke-width: 4; fill: none; }
      .spi_mosi { stroke: #0ea5e9; stroke-width: 4; fill: none; }
      .spi_res { stroke: #f97316; stroke-width: 4; fill: none; }
      .spi_dc { stroke: #8b5cf6; stroke-width: 4; fill: none; }
      .spi_cs { stroke: #ec4899; stroke-width: 4; fill: none; }
      .ds { stroke: #16a34a; stroke-width: 4; fill: none; }
      .dht { stroke: #7c3aed; stroke-width: 4; fill: none; }
      .relay { stroke: #d97706; stroke-width: 4; fill: none; }
      .hole { fill: #cbd5e1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="1180" fill="#f1f5f9" />

  <text x="60" y="60" class="title">面包板摆放接线图</text>
  <text x="60" y="95" class="subtitle">按你现在这 4 个模块和 SPI OLED 实际接法绘制，尽量按“照着摆、照着插”的方式表达。</text>

  <!-- Breadboard -->
  <rect x="90" y="150" width="1140" height="820" class="breadboard" />
  <path d="M130 220 L1190 220" class="powerrail" />
  <path d="M130 260 L1190 260" class="groundrail" />
  <path d="M130 860 L1190 860" class="powerrail" />
  <path d="M130 900 L1190 900" class="groundrail" />
  <text x="95" y="225" class="tiny" fill="#dc2626">+ 3V3 电源排</text>
  <text x="95" y="265" class="tiny">- GND 地线排</text>
  <text x="95" y="865" class="tiny" fill="#dc2626">+ 备用电源排</text>
  <text x="95" y="905" class="tiny">- 备用地线排</text>

